<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>江之岛盾子 - 绝望分析室</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Impact", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            height: 100vh;
            color: #fff;
            background: #111;
        }

        /* 🟢 修改点：背景路径 */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('../images/bg10.jpg') no-repeat center center;
            background-size: cover;
            z-index: -2;
            filter: contrast(1.2) brightness(0.6);
            animation: bgBreath 5s infinite alternate;
        }

        :root {
            --theme-fashion: #ff00cc; 
            --theme-glitch: #00ffff;
            --theme-dark: #0a0a0a;
        }

        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 999;
        }

        .main-layout {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        .gallery-left {
            width: 45%;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            background: linear-gradient(120deg, var(--theme-fashion) 0%, transparent 40%);
        }

        .character-img {
            height: 100%;
            width: auto;
            object-fit: contain;
            filter: grayscale(100%) contrast(1.2) drop-shadow(10px 10px 0px rgba(0,0,0,0.5));
            transform: translateX(-50px); 
            opacity: 0;
            animation: slideUpBig 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards 0.3s;
            transition: 0.5s;
        }

        .character-img:hover { 
            filter: grayscale(0%) contrast(1.1) drop-shadow(0 0 20px var(--theme-fashion));
            transform: scale(1.02);
        }

        .deco-text {
            position: absolute;
            top: 50%; left: 0;
            font-size: 15vh;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.1);
            z-index: -1;
            transform: rotate(-90deg) translate(0, -50%);
            transform-origin: center;
            white-space: nowrap;
            letter-spacing: 10px;
        }

        .back-btn {
            position: absolute;
            top: 40px; left: 40px;
            padding: 10px 40px;
            background: #000;
            border: 1px solid var(--theme-fashion);
            color: #fff;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 5px 5px 0 var(--theme-fashion);
            z-index: 1000;
            transition: 0.2s;
        }

        .back-btn:hover {
            transform: translate(-3px, -3px);
            box-shadow: 8px 8px 0 var(--theme-glitch);
            border-color: var(--theme-glitch);
        }

        .gallery-right {
            width: 55%;
            padding: 60px;
            overflow-y: auto;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
            margin-bottom: 50px;
            position: relative;
        }

        .glitch-title {
            font-size: 4rem;
            color: #fff;
            position: relative;
            animation: glitch-skew 3s infinite linear alternate-reverse;
        }
        
        .glitch-title::before, .glitch-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .glitch-title::before {
            left: 2px; text-shadow: -1px 0 var(--theme-fashion);
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }
        .glitch-title::after {
            left: -2px; text-shadow: -1px 0 var(--theme-glitch);
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim2 2s infinite linear alternate-reverse;
        }

       .gallery-header span {
           font-weight: 900;
           font-size: 1.5rem;
           padding: 5px 15px;
           text-transform: uppercase;
           animation: colorMadness 0.4s infinite steps(4); 
           transform: skew(-10deg);
           border: 3px solid #fff;
       }
       
       @keyframes colorMadness {
           0% { background: #fff; color: #000; box-shadow: 5px 5px 0 #ff00cc; }
           25% { background: #ff00cc; color: #fff; box-shadow: -5px 5px 0 #00ffff; }
           50% { background: #00ffff; color: #000; box-shadow: -5px -5px 0 #ffff00; }
           75% { background: #ffff00; color: #000; box-shadow: 5px -5px 0 #000; }
           100% { background: #000; color: #fff; box-shadow: 5px 5px 0 #ff00cc; }
       }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
        }

        .gallery-item {
            height: 220px;
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.2);
            transition: 0.4s;
        }

        .gallery-item:hover {
            border-color: var(--theme-fashion);
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 0, 204, 0.2);
            z-index: 10;
        }

        .gallery-item:hover img {
            filter: grayscale(0%) contrast(1.1);
        }

        .footer-quote {
            margin-top: 80px;
            text-align: right;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        .footer-quote p {
            font-size: 1.5rem;
            background: -webkit-linear-gradient(0deg, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--theme-fashion); }

        @keyframes slideUpBig {
            from { transform: translateX(-100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes bgBreath {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            10% { transform: skew(5deg); }
            20% { transform: skew(0deg); }
            90% { transform: skew(0deg); }
            100% { transform: skew(-5deg); }
        }
        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 30px, 0); transform: translate(2px,0); }
            100% { clip: rect(80px, 9999px, 100px, 0); transform: translate(-2px,0); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(50px, 9999px, 60px, 0); transform: translate(-2px,0); }
            100% { clip: rect(120px, 9999px, 140px, 0); transform: translate(2px,0); }
        }

        #particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            color: var(--theme-fashion);
            opacity: 0.3;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="crt-overlay"></div>
    <div id="particles"></div>

    <div class="main-layout">
        <div class="gallery-left">
            <a href="index.html#junko" class="back-btn">NO ESCAPE</a>
            
            <img src="../images/img013.jpg" alt="江之岛盾子" class="character-img">
            
            <div class="deco-text">ULTIMATE DESPAIR</div>
        </div>

        <div class="gallery-right">
            <div class="gallery-header">
                <h1 class="glitch-title" data-text="FASHIONISTA">FASHIONISTA</h1>
                <span>ENOSHIMA JUNKO</span>
            </div>

            <div class="gallery-grid">
                <div class="gallery-item"><img src="../images/img036.jpg" alt="时尚1"></div>
                <div class="gallery-item"><img src="../images/img037.jpg" alt="时尚2"></div>
                <div class="gallery-item"><img src="../images/img038.jpg" alt="时尚3"></div>
                <div class="gallery-item"><img src="../images/img039.jpg" alt="时尚4"></div>
            </div>

            <div class="footer-quote">
                <p>“绝望是会传染的...”</p>
                <p style="font-size: 1rem; color: #666; margin-top:10px;">THE END OF HOPE'S PEAK ACADEMY</p>
            </div>
        </div>
    </div>

    <script>
        const particlesContainer = document.getElementById('particles');
        const symbols = ['👑', '☠', '❌', '👁️'];

        function createParticle() {
            const span = document.createElement('span');
            span.classList.add('particle');
            span.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            
            span.style.left = Math.random() * 100 + 'vw';
            span.style.fontSize = (Math.random() * 20 + 20) + 'px';
            span.style.animationDuration = (Math.random() * 5 + 3) + 's';
            
            particlesContainer.appendChild(span);

            setTimeout(() => {
                span.remove();
            }, 8000);
        }
        setInterval(createParticle, 300);
    </script>
</body>
</html>
