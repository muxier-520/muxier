<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的数字空间</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- 全局设定 --- */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-color: #ffffff;
            --blur-amount: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
        }

        body {
            height: 100vh;
            width: 100vw;
            /* 默认高质量背景图 */
            background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* 背景切换时的平滑过渡 */
            transition: background-image 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- 核心毛玻璃卡片 --- */
        .glass-card {
            position: relative;
            width: 90%;
            max-width: 400px;
            /* 核心：背景模糊与饱和度提升，制造通透感 */
            backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            background-color: var(--glass-bg);
            border-radius: 30px;
            /* 精细的边框光照效果 */
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.2),
                inset 0 0 20px rgba(255,255,255,0.05);
            color: var(--text-color);
            overflow: hidden; /* 确保子元素滑动不溢出圆角 */
            transition: all 0.5s ease;
        }

        /* 主要内容区域 (用于滑动时产生模糊变暗效果) */
        .main-content {
            padding: 50px 40px 40px;
            text-align: center;
            transition: filter 0.5s ease, opacity 0.5s ease;
        }

        /* 当设置面板打开时，主要内容变模糊 */
        .glass-card.settings-active .main-content {
            filter: blur(5px) brightness(0.8);
            opacity: 0.7;
        }

        /* --- 设置按钮 (齿轮图标) --- */
        .settings-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            z-index: 10;
            opacity: 0.7;
            transition: all 0.3s ease;
        }
        .settings-toggle:hover {
            opacity: 1;
            transform: rotate(90deg);
        }

        /* --- 头像交互区域 --- */
        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 25px;
            cursor: pointer;
            group: true; /* 用于hover检测 */
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            /* 双层边框增加立体感 */
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        /* 头像悬停遮罩 */
        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(2px);
        }

        .avatar-container:hover .avatar-overlay {
            opacity: 1;
        }
        .avatar-container:hover .avatar {
            transform: scale(1.05);
        }

        /* --- 文本信息 --- */
        .name {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .bio {
            font-size: 15px;
            line-height: 1.7;
            opacity: 0.85;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* --- 社交按钮 --- */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-btn {
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 13px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* --- 滑动设置面板 --- */
        .settings-panel {
            /* 默认隐藏在卡片底部 */
            max-height: 0;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            /* 滑动过渡效果 */
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1), padding 0.6s ease;
        }

        /* 激活状态：滑出面板 */
        .glass-card.settings-active .settings-panel {
            max-height: 300px; /* 足够容纳内容的高度 */
            padding: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* 设置项样式 */
        .control-item {
            margin-bottom: 20px;
        }
        
        .control-label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        /* 自定义文件上传按钮 */
        .custom-file-upload {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border: 1px dashed rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            font-size: 13px;
        }
        .custom-file-upload:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255, 255, 255, 0.7);
        }

        /* 音乐播放控制器 */
        .music-control-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
        }
        .play-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.9);
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .play-btn:active { transform: scale(0.9); }
        .music-info { font-size: 12px; opacity: 0.8; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;}

    </style>
</head>
<body>

    <div class="glass-card" id="main-card">
        <div class="settings-toggle" id="settings-btn">⚙️</div>

        <div class="main-content">
            <div class="avatar-container" onclick="document.getElementById('avatar-upload').click()">
                <img src="https://api.dicebear.com/9.x/notionists/svg?seed=Mia" alt="Avatar" class="avatar" id="avatar-img">
                <div class="avatar-overlay">点击更换头像</div>
                <input type="file" id="avatar-upload" hidden accept="image/*">
            </div>
            
            <h1 class="name" contenteditable="true" spellcheck="false">您的名字</h1>
            <p class="bio" contenteditable="true" spellcheck="false">
                Design. Code. Create.<br>
                点击这里编辑您的个性签名。<br>
                保持热爱，奔赴山海。
            </p>

            <div class="social-links">
                <a href="#" class="social-btn">WeChat</a>
                <a href="#" class="social-btn">Bilibili</a>
                <a href="#" class="social-btn">Github</a>
            </div>
        </div>

        <div class="settings-panel">
            <div class="control-item">
                <span class="control-label">🖼️ 背景设置</span>
                <label class="custom-file-upload">
                    点击选择新的背景图片...
                    <input type="file" id="bg-upload" hidden accept="image/*">
                </label>
            </div>

            <div class="control-item">
                <span class="control-label">🎵 背景音乐</span>
                <label class="custom-file-upload">
                    点击上传 MP3 音频文件...
                    <input type="file" id="music-upload" hidden accept="audio/mp3,audio/wav">
                </label>
                <div class="music-control-box">
                    <button class="play-btn" id="play-toggle">▶</button>
                    <span class="music-info" id="music-name">暂无音乐</span>
                </div>
            </div>
        </div>
    </div>

    <audio id="bg-audio" loop></audio>

    <script>
        // --- 元素获取 ---
        const mainCard = document.getElementById('main-card');
        const settingsBtn = document.getElementById('settings-btn');
        const avatarUpload = document.getElementById('avatar-upload');
        const avatarImg = document.getElementById('avatar-img');
        const bgUpload = document.getElementById('bg-upload');
        const musicUpload = document.getElementById('music-upload');
        const bgAudio = document.getElementById('bg-audio');
        const playToggle = document.getElementById('play-toggle');
        const musicName = document.getElementById('music-name');

        // --- 1. 设置面板滑动切换 ---
        settingsBtn.addEventListener('click', () => {
            // 切换 class 来触发 CSS 中的滑动和模糊动画
            mainCard.classList.toggle('settings-active');
            // 切换齿轮图标方向
            settingsBtn.style.transform = mainCard.classList.contains('settings-active') ? 'rotate(180deg)' : 'rotate(0deg)';
        });

        // --- 通用文件读取函数 ---
        function handleFileUpload(fileInput, callback) {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => callback(e.target.result, file);
                reader.readAsDataURL(file);
            }
        }

        // --- 2. 头像更换逻辑 ---
        avatarUpload.addEventListener('change', function() {
            handleFileUpload(this, (result) => {
                avatarImg.src = result;
                // 更换成功后给个小提示或动画（这里暂时省略，保持简洁）
            });
        });

        // --- 3. 背景更换逻辑 ---
        bgUpload.addEventListener('change', function() {
            handleFileUpload(this, (result) => {
                // 设置 body 背景
                document.body.style.backgroundImage = `url('${result}')`;
            });
        });

        // --- 4. 音乐处理逻辑 ---
        musicUpload.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                // 使用 URL.createObjectURL 处理大文件音频更高效
                const fileUrl = URL.createObjectURL(file);
                bgAudio.src = fileUrl;
                // 更新播放器状态
                musicName.textContent = file.name;
                playToggle.textContent = "▶";
                // 自动播放
                bgAudio.play().then(() => {
                    playToggle.textContent = "||";
                }).catch(e => console.log("需要用户交互才能播放"));
            }
        });

        playToggle.addEventListener('click', function() {
            if (!bgAudio.src) {
                musicName.textContent = "请先在上方上传音乐 ↑";
                return;
            }
            if (bgAudio.paused) {
                bgAudio.play();
                this.textContent = "||";
            } else {
                bgAudio.pause();
                this.textContent = "▶";
            }
        });

        // --- 细节体验优化：点击卡片外部关闭设置面板 ---
        document.addEventListener('click', (e) => {
            if (mainCard.classList.contains('settings-active') && !mainCard.contains(e.target)) {
                 mainCard.classList.remove('settings-active');
                 settingsBtn.style.transform = 'rotate(0deg)';
            }
        });
    </script>
</body>
</html>
